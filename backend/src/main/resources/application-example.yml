# Labex 实验教学管理系统 - 后端配置文件（示例）
# 使用说明：复制此文件为 application.yml 并配置环境变量

# 文件上传配置
file:
  upload:
    path: ${UPLOAD_PATH:D:/workfordasan/uploads}

# 简化的上传路径配置
upload-path: ${UPLOAD_PATH:D:/workfordasan/uploads}

# 在线编程执行目录
code-exec:
  base-path: ${CODE_EXEC_BASE_PATH:D:/workfordasan/code_exec}

# Labex Agent LSP 配置
labex-agent:
  lsp:
    commands:
      java: ${LABEX_LSP_JAVA_CMD:jdtls}
      typescript: ${LABEX_LSP_TS_CMD:typescript-language-server --stdio}
      vue: ${LABEX_LSP_VUE_CMD:vue-language-server --stdio}
      python: ${LABEX_LSP_PY_CMD:pyright-langserver --stdio}

# 教学闭环文档模板目录
class-docs:
  path: ${CLASS_DOCS_PATH:D:/workfordasan/Class-docs}

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: labex-backend

  # MySQL 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:labex}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    # Druid 连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Neo4j 图数据库配置
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:}

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.labex.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:labex-secret-key-change-this-in-production-at-least-64-bytes}
  expiration: 86400000  # 24小时过期（毫秒）
  header: Authorization
  prefix: "Bearer "

# 日志配置
logging:
  level:
    com.labex: debug
    org.springframework.security: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# RAG 配置
rag:
  # Python 嵌入服务地址
  embedding-service-url: ${EMBEDDING_SERVICE_URL:http://localhost:5000}
  # MiniMax API Key
  mini-max-api-key: ${MINIMAX_API_KEY:}
  # MiniMax API 基础地址
  mini-max-base-url: ${MINIMAX_BASE_URL:https://api.minimaxi.com/v1}
  # MiniMax Coding Plan 工具 API Host
  mini-max-api-host: ${MINIMAX_API_HOST:https://api.minimaxi.com}
  # MiniMax 模型
  mini-max-model: ${MINIMAX_MODEL:MiniMax-M2.7-highspeed}
  # 是否启用图片理解工具
  image-understanding-enabled: true
  # 最大上下文块数
  max-context-chunks: 10
  # 块大小（tokens）
  chunk-size: 500
  # 块重叠（tokens）
  chunk-overlap: 50
  # Tavily 搜索 API Key（可选）
  tavily-api-key: ${TAVILY_API_KEY:}
  # 上传文件路径
  upload-path: ${UPLOAD_PATH:D:/workfordasan/uploads}
